<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon SaaS Portfolio</title>
<style>
:root{
  --neon1:#00f5ff;
  --neon2:#ff00c8;
  --bg-dark:#0f0f1a;
  --text-light:#ffffff;
  --text-dark:#111;
}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f0f1a;
  color: var(--text-light);
  overflow-x:hidden;
  scroll-behavior:smooth;
}
body.light{
  background:#f4f4f4;
  color:var(--text-dark);
}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
.progress-bar{position:fixed;top:0;left:0;height:4px;background:var(--neon1);width:0%;z-index:999;}

.container{max-width:900px;margin:80px auto;padding:30px;background: rgba(255,255,255,0.05);backdrop-filter: blur(15px);border-radius:25px;box-shadow: 0 0 40px rgba(0,255,255,0.2);animation:fadeUp 1s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(20px);}to{opacity:1; transform:translateY(0);}}

h1,h2{text-align:center;margin-bottom:20px;background:linear-gradient(90deg,var(--neon1),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 10px var(--neon1);}
button{padding:12px 25px;border:none;border-radius:25px;cursor:pointer;font-weight:bold;background:linear-gradient(90deg,var(--neon1),var(--neon2));color:black;margin-top:15px;transition:0.3s;}
button:hover{transform:scale(1.05);box-shadow:0 0 20px var(--neon1);}
.typing{font-size:24px;font-weight:bold;text-align:center;margin-bottom:30px;}
.clock{font-size:24px;text-align:center;margin-bottom:30px;}

.card{background: rgba(255,255,255,0.05);padding:20px;margin:20px auto;border-radius:20px;max-width:400px;text-align:center;box-shadow:0 0 20px rgba(0,255,255,0.1);}
textarea{width:100%;padding:15px;border-radius:12px;border:none;outline:none;resize:none;font-size:16px;margin-top:15px;background:rgba(255,255,255,0.1);color:white;}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px;}
.calendar div{padding:10px;border-radius:8px;background:rgba(255,255,255,0.1);}
.today{background:var(--neon1)!important;color:black;}

#graph{width:100%;height:50px;margin-top:15px;display:flex;justify-content:space-between;}
.bar{width:18%;background:var(--neon2);border-radius:5px;height:0;transition:height 0.3s ease;}

footer{text-align:center;padding:30px;font-size:14px;margin-top:50px;}

/* Profile Card */
.profile-card{
  background: rgba(255,255,255,0.05);
  border: 2px solid #00f5ff;
  padding: 30px 20px;
  border-radius: 25px;
  max-width: 400px;
  margin: 0 auto;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,245,255,0.4);
  transition: 0.3s;
}
.profile-card:hover{
  box-shadow: 0 0 40px rgba(0,245,255,0.8);
  transform: translateY(-5px);
}
.profile-card h2{
  color:#00f5ff;
  margin-bottom: 10px;
  font-size:1.8rem;
}
.profile-card p{
  color:#ff00c8;
  font-size:1rem;
}

/* Light Chaser Game */
#lightGame{position:relative;height:250px;margin:20px auto;width:300px;background:rgba(255,255,255,0.05);border-radius:15px;overflow:hidden;}
#lightBlock{position:absolute;width:40px;height:40px;background:var(--neon2);border-radius:50%;cursor:pointer;transition:0.2s;}
#lightScore{margin-top:10px;font-weight:bold;}

/* Tic Tac Toe */
#ticTacToe{display:grid; grid-template-columns:repeat(3,80px); grid-gap:5px; margin:20px auto; justify-content:center;}
#ticTacToe div{width:80px;height:80px;background:rgba(255,255,255,0.05); display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer; transition:0.2s; border-radius:8px; color:white;}
#ticTacToe div:hover{background:var(--neon1);}
#tttResult{margin-top:10px;font-weight:bold;}

/* Responsive */
@media(max-width:768px){
  #ticTacToe{grid-template-columns:repeat(3,60px);}
  #ticTacToe div{width:60px;height:60px;font-size:1.5em;}
  .card{max-width:90%;}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="progress-bar" id="progress"></div>

<!-- Profile -->
<div class="container profile">
  <div class="profile-card">
    <h2>Maynul Hasan</h2>
    <p>Frontend Developer | Neon UI Enthusiast | Interactive Web Apps</p>
  </div>
</div>

<!-- Typing Effect Header -->
<div class="container">
  <h1>Neon SaaS Portfolio</h1>
  <div class="typing" id="typing"></div>
  <button onclick="toggleTheme()">Toggle Dark / Light Mode</button>
</div>

<!-- Live Clock -->
<div class="container">
  <h2>Live Clock</h2>
  <div class="clock" id="clock"></div>
</div>

<!-- Mini Calendar -->
<div class="container">
  <h2>Mini Calendar</h2>
  <div class="card">
    <div id="monthYear"></div>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<!-- Typing Game -->
<div class="container">
  <h2>Typing Game</h2>
  <div id="textToType" class="card"></div>
  <textarea id="userInput" rows="4" placeholder="Start typing here..." disabled></textarea>
  <button id="startBtn">Start Typing</button>
  <div class="card" id="result"></div>
  <div id="graph"></div>
</div>

<!-- Light Chaser Game -->
<div class="container">
  <h2>Light Chaser Game</h2>
  <div id="lightGame">
    <div id="lightBlock"></div>
    <div id="lightScore">Score: 0</div>
  </div>
</div>

<!-- Tic Tac Toe -->
<div class="container">
  <h2>Tic Tac Toe</h2>
  <div id="ticTacToe">
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
  </div>
  <div id="tttResult"></div>
</div>

<footer>© 2026 MD.Al-Maynul Hasan</footer>

<script>
// Dark Mode
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}
if(localStorage.getItem("theme")==="light"){document.body.classList.add("light");}

// Typing Effect
const texts = ["Welcome to Neon SaaS 🚀","Interactive Portfolio 💻","Neon UI Experience ✨"];
let tCount=0,tIndex=0;
function type(){if(tCount===texts.length)tCount=0;let current=texts[tCount];let letter=current.slice(0,++tIndex);document.getElementById("typing").textContent=letter;if(letter.length===current.length){ tCount++; tIndex=0; setTimeout(type,1000);}else setTimeout(type,100);}
type();

// Live Clock
function updateClock(){document.getElementById("clock").textContent=new Date().toLocaleTimeString();}
setInterval(updateClock,1000);
updateClock();

// Scroll Progress
window.onscroll=function(){let winScroll=document.body.scrollTop||document.documentElement.scrollTop;let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;let scrolled=(winScroll/height)*100;document.getElementById("progress").style.width=scrolled+"%";};

// Mini Calendar
function generateCalendar(){
  const calendar=document.getElementById("calendar");
  const monthYear=document.getElementById("monthYear");
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const today=now.getDate();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  monthYear.innerHTML=now.toLocaleString("default",{month:"long"})+" "+year;
  calendar.innerHTML="";
  for(let i=0;i<firstDay;i++) calendar.innerHTML+="<div></div>";
  for(let day=1;day<=daysInMonth;day++){
    if(day===today) calendar.innerHTML+=`<div class="today">${day}</div>`;
    else calendar.innerHTML+=`<div>${day}</div>`;
  }
}
generateCalendar();

// Typing Game
const userInput=document.getElementById("userInput");
const textToType=document.getElementById("textToType");
const resultEl=document.getElementById("result");
const startBtn=document.getElementById("startBtn");
const graphContainer=document.getElementById("graph");
const gameTexts=[
  "The quick brown fox jumps over the lazy dog.",
  "Practice coding every day.",
  "JavaScript makes web interactive.",
  "Small steps lead to big results."
];
let currentText="",timer;
graphContainer.innerHTML="";
for(let i=0;i<5;i++){let bar=document.createElement("div");bar.className="bar";graphContainer.appendChild(bar);}
startBtn.addEventListener("click",()=>{
  const randomIndex=Math.floor(Math.random()*gameTexts.length);
  currentText=gameTexts[randomIndex];
  textToType.textContent=currentText;
  userInput.value="";
  userInput.disabled=false;
  userInput.focus();
  resultEl.textContent="";
  document.querySelectorAll(".bar").forEach(b=>b.style.height="0px");
});
userInput.addEventListener("input",updateGraph);
function updateGraph(){
  const input=userInput.value.trim();
  const words=input.split(/\s+/).filter(Boolean).length;
  const wpm=Math.round(words/0.5); // 30s timer approximation
  let correct=0;
  for(let i=0;i<Math.min(input.length,currentText.length);i++){if(input[i]===currentText[i]) correct++;}
  const accuracy=Math.round(correct/currentText.length*100);
  resultEl.textContent=`WPM: ${wpm} | Accuracy: ${accuracy}%`;
  const bars=document.querySelectorAll(".bar");
  bars[0].style.height=Math.min(wpm,100)+"px";
  bars[1].style.height=accuracy+"px";
  bars[2].style.height=Math.min(wpm/2,50)+"px";
  bars[3].style.height=accuracy/2+"px";
  bars[4].style.height=(Math.min(wpm,100)*accuracy/100)+"px";
}

// Light Chaser Game
const lightBlock=document.getElementById("lightBlock");
const lightGame=document.getElementById("lightGame");
const lightScoreEl=document.getElementById("lightScore");
let lightScore=0;
function moveLight(){
  const maxX=lightGame.clientWidth-40;
  const maxY=lightGame.clientHeight-40;
  const x=Math.floor(Math.random()*maxX);
  const y=Math.floor(Math.random()*maxY);
  lightBlock.style.left=x+"px";
  lightBlock.style.top=y+"px";
}
lightBlock.addEventListener("click",function(){lightScore++; lightScoreEl.textContent="Score: "+lightScore; moveLight();});
setInterval(moveLight,1500);
moveLight();

// Tic Tac Toe
const tttCells=document.querySelectorAll("#ticTacToe div");
let tttTurn="X"; let tttOver=false; const tttResult=document.getElementById("tttResult");
function checkTicTacToe(){
  const winCombos=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(const combo of winCombos){
    const [a,b,c]=combo;
    if(tttCells[a].textContent && tttCells[a].textContent===tttCells[b].textContent && tttCells[a].textContent===tttCells[c].textContent){
      tttResult.textContent=tttCells[a].textContent+" Wins!"; tttOver=true; return;
    }
  }
  if([...tttCells].every(cell=>cell.textContent)) {tttResult.textContent="Draw!"; tttOver=true;}
}
tttCells.forEach(cell=>{
  cell.addEventListener("click",()=>{
    if(cell.textContent || tttOver) return;
    cell.textContent=tttTurn;
    checkTicTacToe();
    tttTurn=tttTurn==="X"?"O":"X";
  });
});

// Neon Particle Background
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<120;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1,dx:(Math.random()-0.5)*0.5,dy:(Math.random()-0.5)*0.5,color:Math.random()<0.5? "#00f5ff":"#ff00c8"});}
function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=10;
    ctx.fill();
    p.x+=p.dx;p.y+=p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();
window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>
</body>
</html>
